name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deployment
        run: |
          curl -X POST "https://api.vercel.com/v13/deployments?teamId=team_4n8umVu7jr6D96JSGbspKOeu" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{ "name": "revzio-website", "project": "prj_piDa6d1cy7PGnRloLqFesLgXHmx7", "target": "production", "gitSource": { "type": "github", "ref": "main", "sha": "${{ github.sha }}", "repoId": 1269855996 } }'
